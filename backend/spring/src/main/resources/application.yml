server:
  port: ${PORT:8080}

app:
  s3:
    base-url: https://historo-images.s3.ap-northeast-2.amazonaws.com
  jwt:
    secret: ${JWT_SECRET:historo-dev-secret-key-at-least-32-chars-long!!}
    expiration-ms: 86400000

spring:
  jackson:
    default-property-inclusion: non_null

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
# 로컬 개발용 (H2 인메모리 DB)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:historo
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# 배포용 (PostgreSQL - Render)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
